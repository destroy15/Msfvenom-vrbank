<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Beauté de la Nature</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #f0f8f5;
        color: #2f4f4f;
    }

    header {
        background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
        background-size: cover;
        background-position: center;
        color: white;
        text-align: center;
        padding: 120px 20px;
    }

    header h1 {
        font-size: 3.5em;
        margin: 0;
    }

    header p {
        font-size: 1.2em;
        margin-top: 10px;
    }

    section {
        padding: 50px 20px;
        max-width: 1100px;
        margin: auto;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .card {
        position: relative;
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        transition: transform 0.5s;
    }

    .card:hover img {
        transform: scale(1.1);
    }

    .card h3 {
        position: absolute;
        bottom: 15px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.5);
        padding: 8px 15px;
        border-radius: 8px;
    }

    footer {
        background: #2f4f4f;
        color: white;
        text-align: center;
        padding: 20px;
    }
</style>
</head>

<body>

<header>
    <h1>La Beauté de la Nature</h1>
    <p>Explorez la forêt, la savane et les paysages aquatiques</p>
</header>

<section>
    <h2>🌳 Forêt</h2>
    <div class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" alt="Forêt">
            <h3>Forêt Mystique</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Forêt">
            <h3>Rayons de Soleil</h3>
        </div>
    </div>
</section>

<section>
    <h2>🌾 Savane</h2>
    <div class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1516426122078-c23e76319801" alt="Savane">
            <h3>Coucher de Soleil</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2" alt="Savane">
            <h3>Vie Sauvage</h3>
        </div>
    </div>
</section>

<section>
    <h2>🌊 Eau</h2>
    <div class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Océan">
            <h3>Océan Infini</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Cascade">
            <h3>Chute d'Eau</h3>
        </div>
    </div>
</section>

<footer>
    <p>🌿 Nature & Sérénité — Créé avec amour</p>
</footer>

</body>
</html>
